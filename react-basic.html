<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="react-basic.js">      
    </script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ChatInput() {
            return (
                <>
                    <input placeholder="Send a message to Chatbot" size= "30"/>
                    <button>Send</button>
                    
                </> 
            );
        }
        function ChatMessage({message,sender}) {
            //const message = props.message;
            //const sender = props.sender; 

            //const {message,sender} = props; //destructuring 

           /* if(sender === 'robot') {
              return (
                 <div>
                  <img src="robot.png" width="50" />
                  {message}
                 </div>
                 );
            }
                 */

            return (
            <div>
               {sender === 'robot' && <img src="robot.png" width="50" />}   {/* guard operator*/}
                {message}
                {sender === 'user' && <img src="user.png" width="50" />}  
            </div>
            );
        }

        const app = (
            <>
                <ChatInput /> 
                <ChatMessage message="Hello chatbot" sender="user"/>
                <ChatMessage message="Hello how can I help" sender="robot"/>
                <ChatMessage message="Hello chatbot2" sender="user"/>
                <ChatMessage message="Hello how can I help2" sender="robot"/>
                <ChatMessage message="Hello chatbot3" sender="user"/>
                <ChatMessage message="Hello how can I help3" sender="robot"/>
            </>
        )

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(app);
    </script>
  </body>
</html>
